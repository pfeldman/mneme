# Minimal Phase-0 knowledge entry. NO steps, NO selectors, NO coordinates.
# Shows the two ways an oracle becomes trustworthy (ADR-0005):
#   - evidence DIVERSITY: a behavioral + a network signal agree (different types)
#   - a SEEDED oracle: defined by a human/spec, trusted from cold-start
schema_version: "0"
goal_id: authenticate-user
goal: A returning user can establish an authenticated session.

target:
  app: acme-web
  environment: staging
  observed_app_versions: ["2026.5.3"]

success_signals:
  - type: behavioral
    value: a logout/sign-out action becomes available
    confidence: 0.95
    status: believed
    provenance: { source_type: agent, source_id: explorer-1, observed_app_version: "2026.5.3", last_verified: "2026-06-01T10:00:00Z", observation_count: 9 }
  - type: network
    value: POST to the session endpoint returns 2xx and sets a session cookie
    confidence: 0.9
    status: believed
    provenance: { source_type: agent, source_id: explorer-2, observed_app_version: "2026.5.3", last_verified: "2026-06-01T10:05:00Z", observation_count: 4 }
  # Seeded oracle: trusted from the start because acceptance criteria define it.
  - type: behavioral
    value: the authenticated home state is reachable (per acceptance criteria)
    confidence: 1.0
    status: believed
    provenance: { source_type: spec, source_id: AC-LOGIN-001, last_verified: "2026-05-19T00:00:00Z", observation_count: 1 }

failure_signals:
  - type: text
    value: an inline error indicates invalid credentials and no session is established
    confidence: 0.85
    status: contested
    provenance: { source_type: agent, source_id: explorer-1, observed_app_version: "2026.5.1", last_verified: "2026-05-20T09:00:00Z", observation_count: 3 }

# Phase-1 risks (ADR-0009): structured triggers only, no free text.
risks:
  - id: lockout-after-3-failed
    description: After 3 failed logins within 60s the account locks; a regression silently
      removes the lockout and allows brute force.
    trigger:
      kind: sequence
      n: 4
      action: submit login with wrong password for the same user
      expect: the 4th attempt is rejected with a lockout indication, not authenticated
    mitigation: lockout response distinct from invalid-credentials response
    confidence: 0.9
    status: believed
    provenance: { source_type: spec, source_id: AC-LOGIN-005, last_verified: "2026-05-19T00:00:00Z", observation_count: 1 }

uncertainties:
  - id: u-session-tab-scope
    question: Is the session cookie scoped per tab or per browser? (matters for two-tab logout regressions)
    raised_by: explorer-1
    raised_at: "2026-06-01T10:05:00Z"
    resolved: false

meta:
  created_at: "2026-05-20T09:00:00Z"
  updated_at: "2026-06-01T10:05:00Z"
  contributing_agents: ["explorer-1", "explorer-2"]
