# EXAMPLE GitHub Actions workflow. This is a starting point you copy into your
# own repo and adapt. It is NOT a Praxis-owned, versioned, or supported action.
#
# Praxis ships NO reusable CI action (ADR-0024). CI integration is just: your CI
# calls the `praxis` console commands and gates on the exit code. Everything
# around that command is YOUR CI, owned by your team:
#   - the push, the pull request, and the runner auth are standard git you own
#   - the brain credential, the app login credential, and the saved
#     authenticated session are YOUR runner secrets, never written into this
#     repo and never echoed into the logs
#   - promoting a discovered candidate into trusted knowledge is a HUMAN git
#     merge, never an auto-merge and never an auto-promote
#
# About the CI brain: `praxis regress` / `praxis explore` drive the browser by
# shelling out to the Claude Code CLI headless (`claude -p`, ADR-0027), the SAME
# brain the local console runner uses. So the runner needs the `claude` binary on
# PATH plus whatever credential Claude Code authenticates with (an
# `ANTHROPIC_API_KEY` for the autonomous, no-human CI case). The pip `[live]`
# extra is NOT what runs here: nothing in the installed wheel imports the
# `anthropic` SDK, so installing it would not make `praxis regress` self-drive.
#
# About the saved authenticated session (PRAXIS_AUTH_STATE_USER, ADR-0026): if
# your app's login needs two-factor, a human passes two-factor ONCE locally and
# saves the resulting session; CI reuses that saved session so it never has to
# pass two-factor itself. The session is a SECRET (whoever has it is logged in
# as that role), so it lives in your CI secret store, never in this repo and
# never echoed. A run whose saved session expired reports AUTH-EXPIRED (not
# REGRESSED, not green); a human must then refresh that secret. If the second
# factor is an emailed code the refresh is manual (re-login locally, update the
# secret); if it is an authenticator-app code (TOTP) CI can self-refresh.
#
# Change anything here freely. The only contract Praxis provides is that a
# REGRESSED verdict exits non-zero, so any CI can gate on it.

name: praxis-regress

on:
  # Gate on pull requests and on release tags. `praxis regress` runs every
  # believed goal and FAILS the job on its loud non-zero exit, which a REGRESSED
  # verdict produces (ADR-0023). A real regression cannot pass silently.
  pull_request:
  push:
    tags:
      - "v*"

jobs:
  regress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Praxis
        run: pip install praxis-qa

      # The CI brain is the Claude Code CLI driven headless (`claude -p`,
      # ADR-0027), the SAME brain the local console runner uses; CI has no human
      # session, so it authenticates Claude Code with a runner secret
      # (ANTHROPIC_API_KEY below). Install the CLI on the runner so `praxis
      # regress` can shell out to it. There is no Praxis-specific brain to install
      # from pip; the `[live]` extra is only for the offline experiment harness.
      - name: Install the Claude Code CLI (the headless brain)
        run: npm install -g @anthropic-ai/claude-code

      # Run the gate over every believed goal under .praxis/knowledge/.
      # A REGRESSED or ERROR goal exits non-zero and names the goal and the
      # signal that flipped, which fails this job.
      #
      # The API key, the app login credential, and the saved authenticated
      # session are read from the runner environment (the ADR-0021 secrets
      # channel). They are set as repository or organization secrets in YOUR
      # settings, never committed to the repo and never echoed into the logs.
      # An environment variable takes precedence over any local file, so in CI
      # you supply them purely as secrets with no file on disk.
      #
      # PRAXIS_AUTH_STATE_USER is the saved authenticated session for the "user"
      # role (ADR-0026): a human passed two-factor once locally and saved it, so
      # CI reuses it instead of passing two-factor itself. It is a SECRET a human
      # refreshes when it expires. If the run reports AUTH-EXPIRED, a human must
      # refresh this secret: emailed-code two-factor = manual refresh (re-login
      # locally, update the secret); authenticator-app (TOTP) = CI self-refresh.
      - name: praxis regress (the gate)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          PRAXIS_AUTH_STATE_USER: ${{ secrets.PRAXIS_AUTH_STATE_USER }}
        run: praxis regress

  # OPTIONAL second job: scheduled exploration. Delete this whole job if you
  # only want the regress gate. `praxis explore` hunts off the happy path and
  # writes any findings as CONTESTED candidate files under .praxis/candidates/.
  # That is where Praxis stops: it writes files and exits.
  #
  # What happens to those files next is YOUR CI and YOUR git:
  #   - committing them, pushing them, and opening a pull request for review is
  #     standard git you own; Praxis never pushes and never opens a PR
  #   - NEVER force-push .praxis/ (it is the team's append-only history)
  #   - NEVER auto-merge or auto-promote a candidate; promotion to trusted
  #     knowledge is a human git merge a person reviews (ADR-0024)
  #
  # teach NEVER runs in CI. Authoring new goals is a local, human-in-the-loop
  # session whose output a human commits; an autonomous CI teach would certify
  # its own oracle, which Praxis forbids (ADR-0022, ADR-0024).
  explore:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Praxis
        run: pip install praxis-qa

      - name: Install the Claude Code CLI (the headless brain)
        run: npm install -g @anthropic-ai/claude-code

      # Same runner secrets as the regress job, including the saved
      # authenticated session PRAXIS_AUTH_STATE_USER (ADR-0026): a human-seeded
      # session CI reuses so it never passes two-factor itself. It is never
      # committed and never echoed; an AUTH-EXPIRED run means a human must
      # refresh this secret (emailed code = manual, TOTP = self-refresh).
      - name: praxis explore (writes contested candidate files only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          PRAXIS_AUTH_STATE_USER: ${{ secrets.PRAXIS_AUTH_STATE_USER }}
        run: praxis explore

      # After this, YOUR workflow decides how to surface the new candidate
      # files for human review (for example, open a pull request with them).
      # Praxis does not do this step. A human merge is the promotion.

# Note: the `schedule` trigger that drives the optional explore job above is not
# declared in `on:` in this example on purpose, so copying this file does not
# silently start spending your API budget on a cadence you did not choose. To
# enable scheduled exploration, add a `schedule:` entry under `on:` (for example
# a weekly cron) once you have decided the cadence and the cost are acceptable.
